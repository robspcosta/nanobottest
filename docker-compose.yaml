x-common-config: &common-config
  build:
    context: .
    dockerfile: Dockerfile
  volumes:
    - ~/.nanobot:/root/.nanobot
  environment:
    - TELEGRAM_ENABLED=${TELEGRAM_ENABLED:-}
    - TELEGRAM_TOKEN=${TELEGRAM_TOKEN:-}
    - TELEGRAM_ALLOW_FROM=${TELEGRAM_ALLOW_FROM:-}
    - WHATSAPP_ENABLED=${WHATSAPP_ENABLED:-}
    - WHATSAPP_ALLOW_FROM=${WHATSAPP_ALLOW_FROM:-}
    - DATABASE_URL=${DATABASE_URL:-postgresql://nanobot:nanobot123@db:5432/nanobot}

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: nanobot-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=nanobot
      - POSTGRES_USER=nanobot
      - POSTGRES_PASSWORD=nanobot123
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U nanobot" ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - nanobot-db-data:/var/lib/postgresql/data

  nanobot-gateway:
    container_name: nanobot-gateway
    <<: *common-config
    depends_on:
      db:
        condition: service_healthy
    command: [ "gateway" ]
    restart: unless-stopped
    ports:
      - 18790:18790
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  nanobot-cli:
    <<: *common-config
    depends_on:
      - db
    profiles:
      - cli
    command: [ "status" ]
    stdin_open: true
    tty: true

volumes:
  nanobot-db-data:
